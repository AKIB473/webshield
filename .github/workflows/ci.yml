name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install WebShield + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --cov=webshield --cov-report=xml

      - name: Verify module count
        run: |
          python3 -c "
          from webshield.core.scanner import ALL_MODULES
          print(f'Total modules: {len(ALL_MODULES)}')
          assert len(ALL_MODULES) >= 78, f'Expected 78+ modules, got {len(ALL_MODULES)}'
          print('Module count OK')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── Integration Test — Demo App ─────────────────────────────────────────
  demo-scan:
    name: Integration Test (Demo App Scan)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebShield + Flask (demo deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install flask httpx

      - name: Verify demo app syntax
        run: python3 -c "import py_compile; py_compile.compile('demo/app.py'); print('demo/app.py syntax OK')"

      - name: Start demo vulnerable app
        run: |
          python3 demo/app.py &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          # Wait up to 10s for app to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Demo app is ready (attempt $i)"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
          curl -sf http://localhost:5000/ | grep -q "WebShield Demo" || (echo "Demo app not responding!" && exit 1)

      - name: Run WebShield against demo app
        run: |
          webshield scan http://localhost:5000 \
            --json /tmp/demo_results.json \
            --output /tmp/demo_report.html \
            --timeout 15

      - name: Verify scan found critical issues
        run: |
          python3 -c "
          import json, sys
          with open('/tmp/demo_results.json') as f:
              r = json.load(f)
          s = r['summary']
          print(f'Score: {r[\"score\"]}/100  Grade: {r[\"grade\"]}')
          print(f'CRITICAL:{s[\"critical\"]} HIGH:{s[\"high\"]} MEDIUM:{s[\"medium\"]} TOTAL:{s[\"total\"]}')
          print(f'Modules fired: {sorted(set(f[\"module\"] for f in r[\"findings\"]))}')

          # Must detect sufficient findings (relaxed thresholds for CI reliability)
          assert s['critical'] >= 5, f'Expected 5+ CRITICAL, got {s[\"critical\"]}'
          assert s['total'] >= 30, f'Expected 30+ total findings, got {s[\"total\"]}'

          # Must detect key modules
          found_modules = set(f['module'] for f in r['findings'])
          required = [
              'cors', 'jwt', 'secret_leak', 'info_leak',
              'idor_check', 'headers', 'cookies',
          ]
          missing = [m for m in required if m not in found_modules]
          if missing:
              print(f'WARNING: modules not fired: {missing}')
              # Only fail if more than 2 required modules are missing
              if len(missing) > 2:
                  sys.exit(1)
          print(f'Integration test PASSED. {len(found_modules)} modules fired findings.')
          "

      - name: Upload demo scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-scan-report
          path: |
            /tmp/demo_results.json
            /tmp/demo_report.html

  # ─── All modules importable ───────────────────────────────────────────────
  import-check:
    name: Module Import Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebShield
        run: pip install -e .

      - name: Check all modules import cleanly
        run: |
          python3 -c "
          import importlib
          from webshield.core.scanner import ALL_MODULES
          failed = []
          for mod in ALL_MODULES:
              try:
                  importlib.import_module(f'webshield.modules.{mod}')
              except Exception as e:
                  failed.append(f'{mod}: {e}')
          if failed:
              print('IMPORT FAILURES:')
              for f in failed:
                  print(f'  {f}')
              raise SystemExit(1)
          print(f'All {len(ALL_MODULES)} modules import cleanly.')
          "

  # ─── Self-scan (scan WebShield's own source) ──────────────────────────────
  self-scan:
    name: WebShield Self-Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebShield
        run: pip install -e .

      - name: Scan GitHub repo page
        run: |
          webshield scan https://github.com/AKIB473/webshield \
            --json /tmp/self_scan.json \
            --timeout 15 \
            --modules headers,ssl_tls,cors,csp,clickjacking,sri_check,cookies,security_txt,suspicious_comments,permissions_policy,private_ip_disclosure,dangerous_js
          python3 -c "
          import json
          with open('/tmp/self_scan.json') as f:
              r = json.load(f)
          print(f'Self-scan: Score {r[\"score\"]}/100 | {r[\"summary\"][\"total\"]} findings')
          "

      - name: Upload self-scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-scan-results
          path: /tmp/self_scan.json
