name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install WebShield + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --cov=webshield --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── Integration Test — Demo App ─────────────────────────────────────────
  demo-scan:
    name: Integration Test (Demo App Scan)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebShield + Flask (demo deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install flask httpx

      - name: Start demo vulnerable app
        run: |
          python3 demo/app.py &
          sleep 3
          curl -s http://localhost:5000/ | grep -q "WebShield Demo"
          echo "Demo app is running"

      - name: Run WebShield against demo app
        run: |
          webshield scan http://localhost:5000 \
            --json /tmp/demo_results.json \
            --output /tmp/demo_report.html \
            --timeout 12

      - name: Verify scan found critical issues
        run: |
          python3 -c "
          import json, sys
          with open('/tmp/demo_results.json') as f:
              r = json.load(f)
          s = r['summary']
          print(f'Score: {r[\"score\"]}/100  Grade: {r[\"grade\"]}')
          print(f'CRITICAL:{s[\"critical\"]} HIGH:{s[\"high\"]} MEDIUM:{s[\"medium\"]} TOTAL:{s[\"total\"]}')

          # Must detect at least these findings
          assert s['critical'] >= 10, f'Expected 10+ CRITICAL, got {s[\"critical\"]}'
          assert s['total'] >= 50, f'Expected 50+ total findings, got {s[\"total\"]}'

          # Must detect key modules
          found_modules = set(f['module'] for f in r['findings'])
          required = ['cors', 'jwt', 'nosql_injection', 'insecure_deserialization',
                      'secret_leak', 'info_leak', 'idor_check', 'supply_chain',
                      'auth_hardening', 'headers', 'web_cache_deception']
          missing = [m for m in required if m not in found_modules]
          if missing:
              print(f'MISSING MODULES: {missing}')
              sys.exit(1)
          print(f'All {len(required)} required modules fired. Integration test PASSED.')
          "

      - name: Upload demo scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-scan-report
          path: |
            /tmp/demo_results.json
            /tmp/demo_report.html

  # ─── Self-scan (scan WebShield's own source) ──────────────────────────────
  self-scan:
    name: WebShield Self-Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebShield
        run: pip install -e .

      - name: Scan GitHub repo page
        run: |
          webshield scan https://github.com/AKIB473/webshield \
            --json /tmp/self_scan.json \
            --timeout 12 \
            --modules headers,ssl_tls,cors,csp,clickjacking,sri_check,cookies,security_txt
          python3 -c "
          import json
          with open('/tmp/self_scan.json') as f:
              r = json.load(f)
          print(f'Self-scan: Score {r[\"score\"]}/100 | {r[\"summary\"][\"total\"]} findings')
          "

      - name: Upload self-scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-scan-results
          path: /tmp/self_scan.json
